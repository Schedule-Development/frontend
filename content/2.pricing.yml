title: Planos transparentes para barbeiros de elite
description: Sem taxas escondidas. Escolha o plano ideal para alavancar a sua barbearia hoje mesmo.
plans:
  - title: Iniciante
    description: O essencial para organizar a sua agenda e dizer adeus ao papel.
    price:
      month: 19€
      year: 190€
    features:
      - Agenda online 24/7
      - Lembretes por Email
      - Até 100 agendamentos/mês
      - Suporte por email
    button:
      label: Começar Trial Grátis
      variant: soft

  - title: Profissional
    description: O nosso pacote mais popular com automação de WhatsApp.
    price:
      month: 29€
      year: 290€
    highlight: true
    scale: true
    highlight_text: "Mais Popular"
    features:
      - Agendamentos ilimitados
      - Lembretes por WhatsApp (100% automático)
      - Dashboard Financeiro
      - Fecho de Caixa diário
      - Página de preçário personalizável
      - Suporte prioritário 24/7
    button:
      label: Escolher Profissional

  - title: Barbearia (Equipa)
    description: Para espaços com 3 ou mais profissionais na mesma agenda.
    price:
      month: 59€
      year: 590€
    features:
      - Todas as funções do Profissional
      - Múltiplos calendários (Até 5 barbeiros)
      - Link dedicado por profissional
      - Gestão de Comissões
      - Integração API/n8n
    button:
      label: Escolher Equipa
      variant: soft

faq:
  title: Perguntas Frequentes
  description: Tudo o que precisa de saber sobre os nossos planos.
  items:
    - label: Posso alterar o meu plano mais tarde?
      content: Sim! Pode fazer upgrade ou downgrade em qualquer momento a partir das definições da sua conta.
    - label: Que métodos de pagamento aceitam?
      content: Aceitamos cartões de crédito/débito via Stripe, MBWay e Referência Multibanco.
    - label: Preciso de usar cartão de crédito no Trial?
      content: Não. Oferecemos 14 dias grátis para experimentar, sem pedir qualquer detalhe de pagamento até lá.
    - label: Existe limite para lembretes de WhatsApp?
      content: Nos planos Profissional e Equipa, os lembretes para clientes são ilimitados e funcionam automaticamente sem precisar que tenha o seu telemóvel ligado.


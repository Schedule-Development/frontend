title: Transparent plans for elite barbers
description: No hidden fees. Choose the ideal plan to boost your barbershop today.
plans:
  - title: Starter
    description: The essentials to organize your schedule and say goodbye to paper.
    price:
      month: R$ 59
      year: R$ 590
    features:
      - Online schedule 24/7
      - Email reminders
      - Up to 100 appointments/month
      - Email support
    button:
      label: Start Free Trial
      variant: soft

  - title: Professional
    description: Our most popular package with WhatsApp automation.
    price:
      month: R$ 89
      year: R$ 890
    highlight: true
    scale: true
    highlight_text: "Save 2 months"
    features:
      - Unlimited appointments
      - WhatsApp reminders (100% automatic)
      - Financial Dashboard
      - Daily cash closure
      - Customizable price list page
      - 24/7 priority support
    button:
      label: Choose Professional

  - title: Team
    description: For spaces with 3 or more professionals on the same schedule.
    price:
      month: R$ 199
      year: R$ 1990
    features:
      - All Professional features
      - Multiple calendars (Up to 5 barbers)
      - Dedicated link per professional
      - Commission management
      - API/n8n integration
    button:
      label: Choose Team
      variant: soft

faq:
  title: Frequently Asked Questions
  description: Everything you need to know about our plans.
  items:
    - label: Can I change my plan later?
      content: Yes! You can upgrade or downgrade at any time from your account settings.
    - label: What payment methods do you accept?
      content: We accept credit/debit cards, MBWay and Multibanco reference.
    - label: Do I need to use a credit card for the Trial?
      content: No. We offer 14 days free to try, without asking for any payment details until then.
    - label: Is there a limit for WhatsApp reminders?
      content: In Professional and Team plans, reminders to clients are unlimited and work automatically without needing your phone turned on.


faq:
  title: Frequently Asked Questions
  description: Everything you need to know about our pricing plans
  items:
    - label: Can I switch plans later?
      content: Yes, you can upgrade or downgrade your plan at any time. Changes take effect at the start of your next billing cycle.
    - label: What payment methods do you accept?
      content: We accept all major credit cards (Visa, Mastercard, American Express) and PayPal.
    - label: Is there a free trial?
      content: Yes, we offer a 14-day free trial for all new users. No credit card required.
    - label: Can I cancel my subscription?
      content: Absolutely. You can cancel your subscription at any time from your account settings. No questions asked.

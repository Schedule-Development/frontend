name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        # A flag --config.node-linker=hoisted ajuda o better-sqlite3 a encontrar os ficheiros binários
        run: pnpm install --no-frozen-lockfile --config.node-linker=hoisted

      - name: Build
        run: pnpm build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production # Adicionei isto para ele ler os Environment Secrets
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Navegar para a pasta do projeto (AJUSTA O CAMINHO SE NECESSÁRIO)
            cd /home/jurack/saas-landing-page || git clone https://github.com/Schedule-Development/saas-landing-page.git /home/jurack/saas-landing-page
            cd /home/jurack/saas-landing-page
            
            # Atualizar código e dependências
            git pull origin main
            export COREPACK_ENABLE_STRICT=0
            corepack enable
            pnpm install --no-frozen-lockfile --config.node-linker=hoisted
            
            # Build e Restart (Assumindo que usas PM2 para manter o site online)
            pnpm build
            pm2 restart saas-app || pm2 start npm --name "saas-app" -- run start

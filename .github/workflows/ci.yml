name: Deploy

# dispara toda vez que algo é empurrado para main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # opcional, mas ajuda a ligar o commit atual ao log da action
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy via SSH (git pull)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e         # erro aborta a execução
            cd /home/geral/saas-landing-page
            git pull origin main
            # docker-compose down
            # docker-compose up -d --build
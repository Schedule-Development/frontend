jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (git pull)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /caminho/do/seu/projeto
            git pull origin main
            # docker compose down
            # docker compose up -d --build
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/schedule-development/saas-landing-page:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/schedule-development/saas-landing-page:latest
            docker stop saas-landing-page || true
            docker rm saas-landing-page || true
            mkdir -p /home/geral/saas-landing-page/data
            docker run -d \
              --name saas-landing-page \
              --restart always \
              -p 3001:3000 \
              -e NODE_ENV=production \
              -e NUXT_PUBLIC_SITE_URL=https://agenda.nodix.com.br \
              -v /home/geral/saas-landing-page/data:/app/data \
              ghcr.io/schedule-development/saas-landing-page:latest
